services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: data_generator_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ecto://postgres:postgres@db/data_generator_prod
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-please-generate-a-secret-with-mix-phx-gen-secret}
      CLOAK_KEY: ${CLOAK_KEY:-UE58DIkZ21oP743vIpaDW+WFiO6Ce0UWYfMzZPQze5Y=}
      PHX_HOST: ${PHX_HOST:-localhost}
      PORT: "4000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    profiles:
      - dev

volumes:
  pgdata:
